<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | Elgin Cafe</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Smooth Scrolling & GSAP -->
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        .menu-page-header {
            padding: 10rem 5% 4rem;
            text-align: center;
            background-color: var(--clr-bg);
        }
        
        .menu-gallery {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 5% 6rem;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1.5rem;
            background-color: var(--clr-bg);
        }
        
        .menu-photo {
            width: 100%;
            height: 500px;
            object-fit: cover;
            border-radius: 6px;
            opacity: 0;
            transform: translateY(40px);
            transition: filter 0.5s ease;
        }

        .menu-photo:hover {
            filter: brightness(1.15);
        }

        /* Masonry feel */
        .menu-photo:nth-child(2n) {
            height: 600px;
        }
        .menu-photo:nth-child(3n) {
            height: 450px;
        }

        @media (max-width: 768px) {
            .menu-page-header {
                padding: 6rem 6% 2.5rem;
            }
            .menu-gallery {
                grid-template-columns: 1fr;
                gap: 1rem;
                padding: 0 6% 4rem;
            }
            .menu-photo,
            .menu-photo:nth-child(2n),
            .menu-photo:nth-child(3n) {
                height: 55vw;
            }
        }
    </style>
</head>
<body>
    <!-- Custom Cursor -->
    <div class="cursor"></div>

    <nav class="navbar scrolled" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="brand">ELGIN CAFE</a>
            <div class="menu-btn" id="menu-btn">
                <span></span>
                <span></span>
            </div>
            <div class="nav-links">
                <a href="index.html#about" class="nav-link">The Story</a>
                <a href="menu.html" class="nav-link">Full Menu</a>
                <a href="https://wa.me/917888546281" target="_blank" class="nav-btn">Reserve a Table</a>
            </div>
        </div>
    </nav>

    <main>
        <header class="menu-page-header">
            <span class="section-label">Culinary Offerings</span>
            <h1 class="section-title">Our <em>Menu</em></h1>
            <p class="body-text" style="margin: 0 auto;">A collection of classic Italian dishes intertwined with the rustic, authentic flavours of Amritsar.</p>
        </header>

        <section class="menu-gallery">
            <img src="https://images.unsplash.com/photo-1544148103-0773bf10d330?q=80&w=1000&auto=format&fit=crop" alt="Restaurant Ambiance" class="menu-photo img-reveal">
            <img src="https://images.unsplash.com/photo-1621815121303-34e2ab900c25?q=80&w=1000&auto=format&fit=crop" alt="Italian Pizza Selection" class="menu-photo img-reveal">
            <img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5?q=80&w=1000&auto=format&fit=crop" alt="Restaurant Cocktails" class="menu-photo img-reveal">
            <img src="https://images.unsplash.com/photo-1414235077428-338989a2e8c0?q=80&w=1000&auto=format&fit=crop" alt="Premium Main Courses" class="menu-photo img-reveal">
            <img src="https://images.unsplash.com/photo-1600565193348-f74bd3c7ccdf?q=80&w=1000&auto=format&fit=crop" alt="Signature Desserts" class="menu-photo img-reveal">
            <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?q=80&w=1000&auto=format&fit=crop" alt="Dining Hall" class="menu-photo img-reveal">
        </section>

        <!-- Footer -->
        <footer class="footer">
            <div class="container">
                <div class="footer-bottom">
                    <p>&copy; 2026 Elgin Cafe Amritsar. All Rights Reserved.</p>
                    <p><a href="index.html" class="text-link">Back to Home <span>→</span></a></p>
                </div>
            </div>
        </footer>
    </main>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // ── LENIS SMOOTH SCROLL (requestAnimationFrame — mobile friendly) ──
        const lenis = new Lenis({
            duration: 1.0,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            direction: 'vertical',
            smooth: true,
        });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        // Custom cursor
        const cursor = document.querySelector('.cursor');
        const links = document.querySelectorAll('a, button, .menu-photo');
        let mouseX = 0, mouseY = 0, cX = 0, cY = 0;
        
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX; mouseY = e.clientY;
        });
        gsap.ticker.add(() => {
            cX += (mouseX - cX) * 0.15;
            cY += (mouseY - cY) * 0.15;
            gsap.set(cursor, { x: cX, y: cY });
        });

        links.forEach(link => {
            link.addEventListener('mouseenter', () => cursor.classList.add('hover-active'));
            link.addEventListener('mouseleave', () => cursor.classList.remove('hover-active'));
        });

        // Mobile menu toggle
        const menuBtn = document.getElementById('menu-btn');
        const navLinks = document.querySelector('.nav-links');
        if (menuBtn) {
            menuBtn.addEventListener('click', () => {
                navLinks.classList.toggle('active');
                menuBtn.classList.toggle('active');
                if (navLinks.classList.contains('active')) {
                    lenis.stop();
                } else {
                    lenis.start();
                }
            });
            document.querySelectorAll('.nav-link, .nav-btn').forEach(link => {
                link.addEventListener('click', () => {
                    navLinks.classList.remove('active');
                    menuBtn.classList.remove('active');
                    lenis.start();
                });
            });
        }

        // ── INSET CLIP PATH IMAGE REVEAL (amrit-egg style) ──
        gsap.utils.toArray('.img-reveal').forEach((img, i) => {
            gsap.fromTo(img,
                { clipPath: 'inset(15%)', opacity: 0, y: 40 },
                { 
                    clipPath: 'inset(0%)', 
                    opacity: 1, 
                    y: 0,
                    duration: 1.2, 
                    delay: i * 0.05,
                    ease: 'expo.out',
                    scrollTrigger: { trigger: img, start: 'top 85%' }
                }
            );
        });
    </script>
</body>
</html>
